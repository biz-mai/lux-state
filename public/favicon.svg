<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0762A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark square background with slight rounding -->
  <rect width="64" height="64" rx="10" ry="10" fill="url(#darkGrad)" />

  <!-- Stylized rooftop / chevron peak -->
  <polygon points="32,10 52,28 12,28" fill="url(#goldGrad)" />

  <!-- Building body -->
  <rect x="20" y="28" width="24" height="22" fill="url(#goldGrad)" />

  <!-- Door cutout -->
  <rect x="27" y="38" width="10" height="12" fill="url(#darkGrad)" rx="1" />

  <!-- Two small windows -->
  <rect x="22" y="31" width="6" height="5" fill="url(#darkGrad)" rx="1" />
  <rect x="36" y="31" width="6" height="5" fill="url(#darkGrad)" rx="1" />

  <!-- "L" monogram baseline -->
  <rect x="14" y="52" width="36" height="2.5" rx="1" fill="url(#goldGrad)" opacity="0.7" />
</svg>
